<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jednoduché kyvadlo - Simulace</title>
    
    <link rel="stylesheet" href="../../shared/css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        .panel-nastroju {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #fff;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
        }
        #grafy-sloupec {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 350px;
        }
        #graf-kontejner, #graf-cas {
            min-height: 240px !important;
            flex: 1;
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <main>
        <h1 class="simulation-title">Interaktivní simulace: Jednoduché kyvadlo</h1>
        <p>Pomocí sliderů můžete měnit parametry systému a sledovat fázový portrét (závislost úhlové rychlosti na úhlu).</p>
        
        <div class="panel-nastroju">
            <div class="control-group">
                <label>Hmotnost: <span id="valM">10</span></label>
                <input type="range" id="sliderM" min="1" max="50" value="10">
            </div>
            <div class="control-group">
                <label>Délka vlákna: <span id="valL">150</span></label>
                <input type="range" id="sliderL" min="50" max="300" step="10" value="150">
            </div>
            <div class="control-group">
                <label>Počáteční úhel: <span id="valTh">90</span>°</label>
                <input type="range" id="sliderTh" min="-180" max="180" value="90">
            </div>
            <div class="control-group">
                <label>Počáteční rychlost: <span id="valOm">0</span></label>
                <input type="range" id="sliderOm" min="-10" max="10" step="0.1" value="0">
            </div>
            <div class="control-group">
                <label>Rychlost času: <span id="valSpeed">1</span>x</label>
                <input type="range" id="sliderSpeed" min="0.1" max="5" step="0.1" value="1">
            </div>
            <div class="control-group checkbox-group">
                <input type="checkbox" id="checkboxTrace" checked>
                <label for="checkboxTrace">Kreslit do grafů</label>
            </div>
            <div class="control-group" style="justify-content: flex-end;">
                <button id="btnPause" class="btn" style="width: 100%; margin-bottom: 5px; background-color: #555;">Pozastavit</button>
                <button id="btnReset" class="btn" style="width: 100%;">Nastavit a restartovat</button>
            </div>
        </div>

        <div class="layout-rozdeleni">
            <div id="kontejner-kyvadla"></div>
            <div id="grafy-sloupec">
                <div id="graf-kontejner"></div>
                <div id="graf-cas"></div>
            </div>
        </div>
    </main>

    <script src="physics.js"></script>
    <script src="sketch.js"></script>

</body>
</html>
