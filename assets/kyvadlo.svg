<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Definice šipky pro osy -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Kreslení stropu / závěsu -->
  <line x1="140" y1="50" x2="260" y2="50" stroke="black" stroke-width="3"/>
  <path d="M 150 50 L 160 35 M 170 50 L 180 35 M 190 50 L 200 35 M 210 50 L 220 35 M 230 50 L 240 35 M 250 50 L 260 35" stroke="black" stroke-width="1.5"/>

  <!-- Osa X -->
  <line x1="200" y1="50" x2="350" y2="50" stroke="#888" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="340" y="40" font-family="serif" font-style="italic" font-size="18" fill="#555">x</text>

  <!-- Osa Y (směřuje dolů) -->
  <line x1="200" y1="50" x2="200" y2="350" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <text x="215" y="345" font-family="serif" font-style="italic" font-size="18" fill="#555">y</text>

  <!-- Vlákno (délka l) -->
  <!-- Výpočet polohy pro úhel 30°: x = 200 + 200*sin(30) = 300; y = 50 + 200*cos(30) = 223.2 -->
  <line x1="200" y1="50" x2="300" y2="223.2" stroke="black" stroke-width="2.5"/>
  <text x="260" y="130" font-family="serif" font-style="italic" font-size="20">l</text>

  <!-- Značka úhlu theta -->
  <path d="M 200 130 A 80 80 0 0 0 240 119.3" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="155" font-family="serif" font-style="italic" font-size="20">θ</text>

  <!-- Závaží (hmotnost m) -->
  <circle cx="300" cy="223.2" r="16" fill="#e74c3c" stroke="black" stroke-width="2"/>
  <text x="325" y="232" font-family="serif" font-style="italic" font-size="20">m</text>

  <!-- Střed otáčení -->
  <circle cx="200" cy="50" r="5" fill="black"/>

  <!-- Projekce polohy (kartézské souřadnice) -->
  <line x1="300" y1="223.2" x2="300" y2="50" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="300" y1="223.2" x2="200" y2="223.2" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Popisky souřadnic -->
  <text x="295" y="40" font-family="serif" font-style="italic" font-size="16" fill="#666">x(t)</text>
  <text x="155" y="228" font-family="serif" font-style="italic" font-size="16" fill="#666">y(t)</text>
</svg>
